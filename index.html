<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Compresor No.1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e222b; color: #ecf0f1; text-align: center; padding: 20px; }
        h1 { color: #f1c40f; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .sub { color: #bdc3c7; font-size: 16px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #2c3e50; padding: 20px; border-radius: 8px; border-left: 5px solid #3498db; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: left; }
        .card.pressure { border-left-color: #2ecc71; }
        h3 { margin: 0; font-size: 14px; color: #95a5a6; text-transform: uppercase; }
        .valor { font-size: 32px; font-weight: bold; margin-top: 10px; color: #fff; }
        .unidad { font-size: 18px; color: #bdc3c7; font-weight: normal; }
        .actualizado { margin-top: 40px; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Parametros de Operacion de Compresor Bellis 50</h1>
    <div class="sub">Sistema de Telemetría Industrial en Tiempo Real by Aliot Merak</div>

    <div class="grid">
        <div class="card">
            <h3>Temp. 1ra Etapa</h3>
            <div class="valor" id="temp1ra">-- <span class="unidad">°C</span></div>
        </div>
        <div class="card">
            <h3>Temp. 2da Etapa</h3>
            <div class="valor" id="temp2da">-- <span class="unidad">°C</span></div>
        </div>
        <div class="card">
            <h3>Temp. 3ra Etapa</h3>
            <div class="card-content">
                <div class="valor" id="temp3ra">-- <span class="unidad">°C</span></div>
            </div>
        </div>
        <div class="card">
            <h3>Temp. Agua Enfriamiento</h3>
            <div class="valor" id="tempAgua">-- <span class="unidad">°C</span></div>
        </div>
        <div class="card">
            <h3>Temp. Aceite</h3>
            <div class="valor" id="tempAceite">-- <span class="unidad">°C</span></div>
        </div>
        <div class="card pressure">
            <h3>Presión de Aceite</h3>
            <div class="valor" id="presionAceite">-- <span class="unidad">PSI</span></div>
        </div>
        
        <!-- [AQUÍ PUEDES COPIAR Y PEGAR MÁS BLOQUES CARD EN EL FUTURO] -->
    </div>

    <p class="actualizado">Último reporte de estado: <span id="fecha">--</span></p>

    <script>
        function actualizarPanel() {
            fetch('/api/datos')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('temp1ra').innerHTML = data.temp1ra + ' <span class="unidad">°C</span>';
                    document.getElementById('temp2da').innerHTML = data.temp2da + ' <span class="unidad">°C</span>';
                    document.getElementById('temp3ra').innerHTML = data.temp3ra + ' <span class="unidad">°C</span>';
                    document.getElementById('tempAgua').innerHTML = data.tempAgua + ' <span class="unidad">°C</span>';
                    document.getElementById('tempAceite').innerHTML = data.tempAceite + ' <span class="unidad">°C</span>';
                    document.getElementById('presionAceite').innerHTML = data.presionAceite + ' <span class="unidad">PSI</span>';
                    document.getElementById('fecha').innerText = data.fecha;
                })
                .catch(err => console.error("Error de actualización:", err));
        }

        actualizarPanel();
        setInterval(actualizarPanel, 3000);
    </script>
</body>
</html>
